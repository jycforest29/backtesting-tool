name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# 동일 브랜치의 이전 run 이 있으면 취소 — CI 비용 절감.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # 유닛 테스트에서 Kafka/Redis/SMTP AutoConfig 제외 — CI 러너엔 없다.
  DISABLED_AUTOCONFIG: >-
    org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,
    org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,
    org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
  # SPRING_SECURITY 기본 열림 모드로 boot — 테스트에서 키 설정 불필요.
  SECURITY_FAIL_ON_MISSING_KEYS: "false"

jobs:
  # ========== Backend ==========
  backend:
    name: Backend (test, coverage, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven verify (tests + JaCoCo coverage gate)
        run: mvn -B -ntp verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  # ========== Frontend ==========
  frontend:
    name: Frontend (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Unit tests
        run: npm test --if-present -- --run

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  # ========== 의존성 보안 스캔 (PR) ==========
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
