# React SPA + /api 프록시 설정
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docker 임베디드 DNS (127.0.0.11) 로 backend 호스트명을 매 요청마다 재해석.
  # nginx 는 proxy_pass 가 리터럴이면 워커 시작 시 한 번만 resolve 해서 캐시한다 →
  # backend 컨테이너 재생성으로 IP 가 바뀌면 502 가 난다. 변수($upstream)로 쓰면
  # 매 요청마다 resolver 를 거치므로 backend 재시작에도 무중단으로 따라간다.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $upstream_backend backend;

  # React Router — 모든 미지의 path는 index.html로 (SPA fallback)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # /api/* 는 backend 서비스로 프록시 (Docker 네트워크 안에서 hostname=backend).
  # 변수형 proxy_pass 는 URI 자동 보존이 안 되므로 $request_uri 로 명시 전달.
  location /api/ {
    proxy_pass http://$upstream_backend:8080$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # WebSocket (SockJS + STOMP)
  location /ws/ {
    proxy_pass http://$upstream_backend:8080$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # 정적 자산 캐싱
  location ~* \.(js|css|png|jpg|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
