apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backtesting-ingress
  namespace: backtesting
  annotations:
    # nginx-ingress 기준. GCP/AWS ALB 등은 주석 다르게.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: backtesting.example.com    # 실제 도메인으로 교체
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 8080 } }
          - path: /ws
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 8080 } }
          - path: /actuator/health
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 8080 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
  tls:
    - hosts: [backtesting.example.com]
      secretName: backtesting-tls      # cert-manager 또는 수동 생성
