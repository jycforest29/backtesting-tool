apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: backtesting
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None   # Headless — StatefulSet 용
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: backtesting
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "384Mi", cpu: "500m" }
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 10
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
  volumeClaimTemplates:
    - metadata: { name: redis-data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: 2Gi }
