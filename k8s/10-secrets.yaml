# 실제 값은 kubectl create secret generic으로 주입하거나 SealedSecrets/SOPS 활용.
# 이 파일은 스펙 예시 — Base64 인코딩된 placeholder.
apiVersion: v1
kind: Secret
metadata:
  name: backtesting-secrets
  namespace: backtesting
type: Opaque
stringData:
  HANTOO_API_KEY: ""              # kubectl edit 으로 주입
  HANTOO_API_SECRET: ""
  HANTOO_ACCOUNT: ""
  HANTOO_ACCOUNT_PRODUCT: "01"
  DART_OPEN_API_KEY: ""
  GMAIL_USERNAME: ""
  GMAIL_APP_PASSWORD: ""
  ALERT_RECIPIENT: ""
  REDIS_PASSWORD: ""
  DB_PASSWORD: ""
---
# 비-민감 설정은 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: backtesting-config
  namespace: backtesting
data:
  HANTOO_PAPER_TRADING: "false"
  HANTOO_RATE_PER_SEC: "18"
  DAILY_LOSS_LIMIT_KRW: "100000"
  CACHE_TYPE: "redis"
  H2_CONSOLE: "false"
  SPRING_PROFILES_ACTIVE: "k8s"
  REDIS_HOST: "redis.backtesting.svc.cluster.local"
  KAFKA_BOOTSTRAP: "kafka.backtesting.svc.cluster.local:9092"
  DB_PATH: "/data/backtesting-tool-db;AUTO_SERVER=TRUE"
  # ELW 스큐 스캐너 (3번 전략) — enabled=false 이면 degraded 응답, 장애 시 circuit breaker 가 흡수
  ELW_ENABLED: "false"
  ELW_CHAIN_URL: ""
  ELW_CHAIN_TR_ID: ""
