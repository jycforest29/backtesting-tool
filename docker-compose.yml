# 전체 스택 로컬 실행.
#   docker compose up -d
#   docker compose logs -f backend
#   docker compose down
#
# 필수 환경변수는 .env 파일에 넣거나 export 후 실행.
#   HANTOO_API_KEY / HANTOO_API_SECRET / HANTOO_ACCOUNT / DART_OPEN_API_KEY 등
#
# 서비스 접속:
#   http://localhost        — 프론트엔드 (nginx)
#   http://localhost:8080   — 백엔드 REST (compose 네트워크 외부에서 직접 확인용)
#   http://localhost:9000   — Kafka UI
#   http://localhost:8001   — Redis Insight (선택)

services:
  redis:
    image: redis:7-alpine
    container_name: bt-redis
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  kafka:
    image: apache/kafka:3.7.1
    container_name: bt-kafka
    ports: ["9092:9092"]
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes: ["kafka-data:/var/lib/kafka/data"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bt-kafka-ui
    ports: ["9000:8080"]
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bt-backend
    ports: ["8080:8080"]
    env_file: [.env]
    environment:
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP=kafka:9092
      - SPRING_PROFILES_ACTIVE=docker
      - DB_PATH=/data/backtesting-tool-db
      - H2_CONSOLE=false          # 운영 배포 시 콘솔 비활성화
      - CACHE_TYPE=redis
    volumes:
      - backend-data:/data
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bt-frontend
    ports: ["80:80"]
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-data:
  kafka-data:
  backend-data:
